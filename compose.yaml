version : '3.8'

services:
  server:
    build:
      context: .
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URI=mongodb://mongo:27017/subledger
      - JWT_SECRET=${JWT_SECRET}
      - PORT=${PORT}
    ports:
      - 5001:5000
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - mongo
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:

